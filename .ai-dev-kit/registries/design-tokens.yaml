kind: design-tokens
schema_version: 1
last_synced_on: "2026-04-19"

colors:
  # Mint accent — the signature. Used sparingly: active states, key actions, recording.
  brand.accent:         "#14b8a6"
  brand.accent-subtle:  "#0d9488"
  brand.accent-muted:   "#134e4a"
  brand.accent-light:   "#2dd4bf"

  # Neutral palette (dark-first)
  neutral.950:          "#0a0a0a"    # page background
  neutral.900:          "#171717"    # card backgrounds
  neutral.800:          "#262626"    # borders, dividers
  neutral.700:          "#404040"    # secondary borders
  neutral.600:          "#525252"    # disabled text
  neutral.500:          "#737373"    # muted text, labels
  neutral.400:          "#a3a3a3"    # body text (secondary)
  neutral.300:          "#d4d4d4"    # body text (primary)
  neutral.200:          "#e5e5e5"    # headings
  neutral.100:          "#f5f5f5"    # titles, emphasis
  neutral.50:           "#fafafa"    # high contrast text

  # Semantic
  semantic.success:     "#22c55e"
  semantic.error:       "#ef4444"
  semantic.warning:     "#eab308"
  semantic.info:        "#3b82f6"

  # Light mode overrides
  light.bg-primary:     "#fafafa"
  light.bg-secondary:   "#f5f5f5"
  light.text-primary:   "#171717"
  light.text-secondary: "#525252"

typography:
  font.mono:          "ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, 'Liberation Mono', monospace"

  scale.display:      { size: "2rem",      weight: 600, line: 1.2 }
  scale.heading-lg:   { size: "1.5rem",    weight: 600, line: 1.3 }
  scale.heading-md:   { size: "1.125rem",  weight: 600, line: 1.4 }
  scale.heading-sm:   { size: "0.875rem",  weight: 600, line: 1.4 }
  scale.body:         { size: "0.875rem",  weight: 400, line: 1.6 }
  scale.body-sm:      { size: "0.75rem",   weight: 400, line: 1.5 }
  scale.caption:      { size: "0.625rem",  weight: 500, line: 1.4 }
  scale.label:        { size: "0.6875rem", weight: 500, line: 1.3 }

spacing:
  space.1:            "4px"
  space.2:            "8px"
  space.3:            "12px"
  space.4:            "16px"
  space.5:            "20px"
  space.6:            "24px"
  space.8:            "32px"
  space.10:           "40px"
  space.12:           "48px"
  space.16:           "64px"

radius:
  radius.sm:          "6px"
  radius.md:          "8px"
  radius.lg:          "12px"
  radius.xl:          "16px"
  radius.2xl:         "24px"
  radius.full:        "9999px"

shadow:
  shadow.sm:          "0 1px 2px 0 rgb(0 0 0 / 0.2)"
  shadow.md:          "0 4px 6px -1px rgb(0 0 0 / 0.3)"
  shadow.glow-mint:   "0 0 20px rgb(20 184 166 / 0.15)"

breakpoints:
  mobile:             "0px"
  tablet:             "768px"
  desktop:            "1024px"
  wide:               "1440px"

motion:
  motion.fast:        "100ms"
  motion.normal:      "200ms"
  motion.slow:        "300ms"
  motion.pulse:       "1.5s"
  ease.standard:      "ease-in-out"
  ease.entrance:      "ease-out"
  ease.exit:          "ease-in"

elevation:
  z.base:             0
  z.dropdown:         10
  z.sticky:           20
  z.topbar:           30
  z.overlay:          40
  z.slide-menu:       50
  z.modal:            60
  z.toast:            70
