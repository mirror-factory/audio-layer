# Promptfoo Evaluation Configuration
# Generated by @mirror-factory/ai-dev-kit
# Run: npx promptfoo eval
# CI: npx promptfoo eval --output results.json

description: "AI Dev Kit Tool Evaluation Suite"

providers:
  - id: anthropic:claude-sonnet-4-20250514
    config:
      temperature: 0

defaultTest:
  options:
    timeout: 30000

tests:
  # Search tool evaluation
  - vars:
      query: "authentication best practices"
    assert:
      - type: contains
        value: "auth"
      - type: javascript
        value: "output.length > 50"
      - type: not-contains
        value: "error"

  - vars:
      query: ""
    assert:
      - type: contains-any
        value: ["no results", "empty", "provide a query"]

  # Code review tool evaluation
  - vars:
      code: "const x = eval(userInput);"
      language: "typescript"
    assert:
      - type: contains-any
        value: ["security", "vulnerability", "eval"]
      - type: javascript
        value: "output.includes('critical') || output.includes('warning')"

  # Content generation evaluation
  - vars:
      prompt: "Write a brief summary of authentication methods"
    assert:
      - type: javascript
        value: "output.length > 100 && output.length < 2000"
      - type: contains-any
        value: ["OAuth", "JWT", "session", "token"]
